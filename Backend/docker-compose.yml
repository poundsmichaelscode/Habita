
services:
  web:
    build: ./HabitaBackend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./HabitaBackend:/usr/src/HabitaBackend
    ports:
      - "8000:8000"
    env_file:
      - ./.env.dev
    depends_on:
      - db

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: habitauser
      POSTGRES_PASSWORD: habitapassword
      POSTGRES_DB: habitadb

volumes:
  postgres_data:
